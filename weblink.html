<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hyderabad — 2BHK Rental Map</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#f4f6f9; color:#2c2c2a; }

header {
  background:#0C447C; color:white;
  padding:12px 24px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
header h1 { font-size:15px; font-weight:500; }
.header-right { display:flex; align-items:center; gap:12px; }
#back-btn {
  display:none; background:rgba(255,255,255,0.15);
  border:0.5px solid rgba(255,255,255,0.3);
  color:white; border-radius:6px;
  padding:5px 12px; font-size:12px; cursor:pointer;
}
#back-btn:hover { background:rgba(255,255,255,0.25); }
#page-label { font-size:12px; opacity:0.7; }

.container {
  display:flex; gap:16px; padding:16px;
  max-width:1100px; margin:0 auto;
}

.map-wrap {
  flex:1; background:white;
  border:0.5px solid #ddd; border-radius:10px; padding:12px;
}
.map-wrap svg { width:100%; height:auto; display:block; }

.sidebar {
  width:270px; display:flex; flex-direction:column; gap:12px;
}
.card {
  background:white; border:0.5px solid #ddd;
  border-radius:10px; padding:14px;
}
.card h3 {
  font-size:11px; font-weight:500; color:#888;
  text-transform:uppercase; letter-spacing:0.05em; margin-bottom:10px;
}

.legend-item { display:flex; align-items:center; gap:8px; font-size:12px; color:#444; margin-bottom:6px; }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

.quadrant-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.q-btn {
  background:#f0f4f8; border:0.5px solid #d0dae6;
  border-radius:8px; padding:10px 8px;
  font-size:12px; font-weight:500; color:#0C447C;
  cursor:pointer; text-align:center; line-height:1.4;
}
.q-btn:hover { background:#ddeaf5; }
.q-btn .q-count { font-size:10px; font-weight:400; color:#888; margin-top:2px; }

.society-list { max-height:300px; overflow-y:auto; }
.society-item {
  padding:8px 10px; border-radius:6px; font-size:12px;
  margin-bottom:4px; border:0.5px solid #eee;
  display:flex; justify-content:space-between; align-items:flex-start;
}
.s-name { font-weight:500; color:#2c2c2a; }
.s-meta { color:#888; font-size:11px; }
.s-price { color:#185FA5; font-weight:500; white-space:nowrap; }
.s-del { color:#c00; font-size:11px; cursor:pointer; }

.empty-state { font-size:12px; color:#aaa; text-align:center; padding:20px 0; }

.add-btn {
  background:#0C447C; color:white; border:none;
  border-radius:8px; padding:10px 16px;
  font-size:13px; cursor:pointer; width:100%;
}
.add-btn:hover { background:#185FA5; }

/* price badge dots on main map */
.society-dot { pointer-events:none; }

/* quadrant hover overlay */
.q-overlay { cursor:pointer; opacity:0; transition:opacity 0.15s; }
.q-overlay:hover { opacity:1; }

/* area pin */
.area-pin { cursor:pointer; }

/* Modal */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.35); z-index:100;
  align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:white; border-radius:12px;
  padding:24px; width:340px; max-width:95vw;
}
.modal h2 { font-size:15px; font-weight:500; margin-bottom:16px; }
.modal label { font-size:12px; color:#666; display:block; margin-bottom:4px; margin-top:10px; }
.modal input,.modal select,.modal textarea {
  width:100%; padding:8px 10px;
  border:0.5px solid #ccc; border-radius:6px;
  font-size:13px; font-family:inherit;
}
.modal textarea { resize:vertical; height:60px; }
.modal-actions { display:flex; gap:8px; margin-top:16px; }
.btn-save {
  background:#0C447C; color:white; border:none;
  border-radius:6px; padding:8px 16px; font-size:13px; cursor:pointer; flex:1;
}
.btn-cancel {
  background:white; color:#444; border:0.5px solid #ccc;
  border-radius:6px; padding:8px 16px; font-size:13px; cursor:pointer; flex:1;
}
</style>
</head>
<body>

<header>
  <h1 id="page-title">Hyderabad — 2BHK Rental Map</h1>
  <div class="header-right">
    <span id="page-label">Click a quadrant to explore</span>
    <button id="back-btn" onclick="showMain()">← Back to full map</button>
  </div>
</header>

<div class="container">

  <!-- MAP AREA -->
  <div class="map-wrap" id="map-wrap">
    <!-- injected by JS -->
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">

    <div class="card" id="sidebar-legend">
      <h3>Zones</h3>
      <div class="legend-item"><div class="legend-dot" style="background:#e00000"></div>IT corridor</div>
      <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Central</div>
      <div class="legend-item"><div class="legend-dot" style="background:#854F0B"></div>West</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div>East / Mid</div>
      <div class="legend-item"><div class="legend-dot" style="background:#111111"></div>Old city</div>
    </div>

    <div class="card" id="sidebar-quadrants" style="display:none">
      <h3>All quadrants</h3>
      <div class="quadrant-grid" id="q-summary"></div>
    </div>

    <div class="card">
      <h3 id="list-title">Societies</h3>
      <div class="society-list" id="society-list"></div>
    </div>

    <button class="add-btn" id="add-btn" onclick="openModal('')">+ Add society</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Add society</h2>
    <label>Society name</label>
    <input type="text" id="inp-name" placeholder="e.g. Aparna Serene Park"/>
    <label>Area</label>
    <input type="text" id="inp-area" placeholder="e.g. Kondapur"/>
    <label>Monthly rent (₹)</label>
    <input type="number" id="inp-rent" placeholder="e.g. 22000"/>
    <label>Deposit (₹)</label>
    <input type="number" id="inp-deposit" placeholder="e.g. 66000"/>
    <label>Price range</label>
    <select id="inp-pricerange">
      <option value="">-- Select --</option>
      <option>Under ₹15,000</option>
      <option>₹15,000 – ₹20,000</option>
      <option>₹20,000 – ₹25,000</option>
      <option>₹25,000 – ₹30,000</option>
      <option>₹30,000 – ₹40,000</option>
      <option>Above ₹40,000</option>
    </select>
    <label>Furnishing</label>
    <select id="inp-furnish">
      <option>Semi-furnished</option>
      <option>Fully furnished</option>
      <option>Unfurnished</option>
    </select>
    <label>Balcony</label>
    <select id="inp-balcony">
      <option value="">-- Select --</option>
      <option>Yes</option>
      <option>No</option>
      <option>Yes — multiple</option>
    </select>
    <label>Sunlight</label>
    <select id="inp-sunlight">
      <option value="">-- Select --</option>
      <option>Good — all day</option>
      <option>Morning only</option>
      <option>Evening only</option>
      <option>Minimal</option>
    </select>
    <label>Notes</label>
    <textarea id="inp-notes" placeholder="Pros, cons, distance from office..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveSociety()">Save</button>
    </div>
  </div>
</div>

function showMain() {
  currentView = 'main';

  document.getElementById('list-title').textContent   = 'All societies';
  document.getElementById('add-btn').onclick = () => openModal('');
  renderMainMap();
  renderList();
}

function showQuadrant(q) {
  currentView = q;
  const info = QUADRANTS[q];
  document.getElementById('back-btn').style.display   = '';
  document.getElementById('sidebar-legend').style.display    = 'none';
  document.getElementById('sidebar-quadrants').style.display = '';
  document.getElementById('page-label').textContent   = info.label + ' quadrant';
  document.getElementById('page-title').textContent   = 'Hyderabad — ' + info.label;
  document.getElementById('list-title').textContent   = info.label + ' societies';
  document.getElementById('add-btn').onclick = () => openModal('');
  renderQuadrantMap(q);
  renderQSummary();
  renderList();
}

    { n:'LB Nagar',     cx:345, cy:252, fc:'#3B6D11', tc:'#27500A', ta:'start',  ty:247, tx:349 },
    { n:'Dilsukhnagar', cx:338, cy:278, fc:'#3B6D11', tc:'#27500A', ta:'start',  ty:273, tx:342 },
    { n:'Charminar',    cx:295, cy:318, fc:'#111111', tc:'#000000', ta:'start',  ty:313, tx:299 },
    { n:'Falaknuma',    cx:270, cy:338, fc:'#111111', tc:'#000000', ta:'middle', ty:352, tx:270 },
    { n:'Bachupally',   cx:262, cy:145, fc:'#e00000', tc:'#8b0000', ta:'start',  ty:140, tx:266 },
    { n:'Malkajgiri',   cx:318, cy:168, fc:'#3B6D11', tc:'#27500A', ta:'start',  ty:163, tx:322 },
    { n:'Alwal',        cx:355, cy:198, fc:'#3B6D11', tc:'#27500A', ta:'start',  ty:193, tx:359 },
  ];
  return pins.map(p => `
    <circle cx="${p.cx}" cy="${p.cy}" r="4" fill="${p.fc}" style="pointer-events:none"/>
    <text x="${p.tx||p.cx}" y="${p.ty}" text-anchor="${p.ta||'middle'}" font-size="9" font-weight="500" fill="${p.tc}" style="pointer-events:none">${p.n}</text>
  `).join('');
}

function societyDotMain(s) {
  const map = {
    NW:{ cx:145, cy:145 }, NE:{ cx:375, cy:145 },
    SW:{ cx:145, cy:375 }, SE:{ cx:375, cy:375 }
  };
  if(!s.quadrant || !map[s.quadrant]) return '';
  const clr = rentColor(s.rent);
  return `<circle class="society-dot" cx="${map[s.quadrant].cx + Math.random()*40-20}" cy="${map[s.quadrant].cy + Math.random()*40-20}" r="5" fill="${clr}" stroke="white" stroke-width="1" opacity="0.85"/>`;
}

// ── QUADRANT MAP SVG ─────────────────────────────────────────────────────────

function renderQuadrantMap(q) {
  const info = QUADRANTS[q];
  const qSocs = societies.filter(s => s.quadrant === q);

  const areaPins = info.areas.map(a => {
    const asSocs = qSocs.filter(s => s.area === a.name);
    const dot = asSocs.length > 0
      ? `<circle cx="${a.cx}" cy="${a.cy-14}" r="8" fill="${rentColor(Math.min(...asSocs.map(x=>x.rent)))}" stroke="white" stroke-width="1.5"/>
         <text x="${a.cx}" y="${a.cy-10}" text-anchor="middle" font-size="7" fill="white" font-weight="500">${asSocs.length}</text>`
      : '';
    return `
      <g class="area-pin" onclick="openModal('${a.name}')" style="cursor:pointer">
        <circle cx="${a.cx}" cy="${a.cy}" r="6" fill="${a.fc}" stroke="white" stroke-width="1.5"/>
        <text x="${a.cx}" y="${a.cy+18}" text-anchor="middle" font-size="10" font-weight="500" fill="${a.tc}">${a.name}</text>
        ${dot}
      </g>`;
  }).join('');

  const svg = `
  <svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
    <rect x="20" y="20" width="440" height="440" rx="6" fill="${info.bg}" stroke="${info.color}" stroke-width="1.5"/>

    <!-- NSEW for this quadrant -->
    ${q==='NW'||q==='NE' ? `<text x="240" y="14" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" font-family="sans-serif">N</text>` : `<text x="240" y="474" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" font-family="sans-serif">S</text>`}
    ${q==='NW'||q==='SW' ? `<text x="10"  y="244" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" font-family="sans-serif">W</text>` : `<text x="472" y="244" text-anchor="middle" font-size="12" font-weight="500" fill="#2C2C2A" font-family="sans-serif">E</text>`}

    <!-- Quadrant name -->
    <text x="240" y="50" text-anchor="middle" font-size="14" font-weight="500" fill="${info.color}" font-family="sans-serif">${info.label}</text>

    <!-- Grid lines -->
    <line x1="20" x2="460" y1="240" y2="240" stroke="${info.color}" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
    <line x1="240" y1="20" x2="240" y2="460" stroke="${info.color}" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>

    <!-- Area pins -->
    <g font-family="sans-serif">
      ${areaPins}
    </g>

    <!-- Rent color legend -->
    <g font-family="sans-serif" font-size="9">
      <rect x="330" y="400" width="120" height="58" rx="4" fill="white" stroke="#ccc" stroke-width="0.5"/>
      <text x="338" y="414" fill="#888">Rent range</text>
      <circle cx="342" cy="426" r="4" fill="#27ae60"/><text x="350" y="430" fill="#555">Under ₹15k</text>
      <circle cx="342" cy="440" r="4" fill="#f39c12"/><text x="350" y="444" fill="#555">₹15k – ₹25k</text>
      <circle cx="342" cy="454" r="4" fill="#c0392b"/><text x="350" y="458" fill="#555">Above ₹25k</text>
    </g>

  </svg>`;

  document.getElementById('map-wrap').innerHTML = svg;
}

// ── HELPERS ──────────────────────────────────────────────────────────────────

function rentColor(rent) {
  if (!rent || rent === 0) return '#888780';
  if (rent < 15000)  return '#27ae60';
  if (rent < 25000)  return '#f39c12';
  return '#c0392b';
}

// ── SIDEBAR LIST ─────────────────────────────────────────────────────────────

function renderList() {
  const list  = document.getElementById('society-list');
  const label = document.getElementById('page-label');

  let filtered = currentView === 'main'
    ? [...societies]
    : societies.filter(s => s.quadrant === currentView);

  filtered.sort((a,b) => a.rent - b.rent);

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">${currentView==='main' ? 'Click a quadrant, then add societies' : 'Click an area pin to add a society'}</div>`;
  } else {
    list.innerHTML = filtered.map(s => `
      <div class="society-item">
        <div style="flex:1;min-width:0">
          <div class="s-name">${s.name}</div>
          <div class="s-meta">${s.area} · ${s.furnish||''}</div>
          ${s.pricerange ? `<div class="s-meta">Range: ${s.pricerange}</div>` : ''}
          ${s.balcony    ? `<div class="s-meta">Balcony: ${s.balcony}</div>` : ''}
          ${s.sunlight   ? `<div class="s-meta">Sunlight: ${s.sunlight}</div>` : ''}
          ${s.notes ? `<div class="s-meta">${s.notes.substring(0,38)}${s.notes.length>38?'…':''}</div>` : ''}
        </div>
        <div style="text-align:right;padding-left:8px">
          <div class="s-price">₹${s.rent.toLocaleString()}</div>
          <div class="s-del" onclick="deleteSociety(${s.id})">remove</div>
        </div>
      </div>
    `).join('');
  }

  if (currentView === 'main') {
    label.textContent = societies.length + ' societ' + (societies.length===1?'y':'ies') + ' total';
  } else {
    const n = filtered.length;
    label.textContent = QUADRANTS[currentView].label + ' · ' + n + ' societ' + (n===1?'y':'ies');
  }
}

function renderQSummary() {
  const grid = document.getElementById('q-summary');
  grid.innerHTML = ['NW','NE','SW','SE'].map(q => {
    const n = societies.filter(s => s.quadrant === q).length;
    return `<div class="q-btn" onclick="showQuadrant('${q}')">
      ${q} · ${QUADRANTS[q].label.split(' ')[0]}
      <div class="q-count">${n} societ${n===1?'y':'ies'}</div>
    </div>`;
  }).join('');
}

// ── MODAL ────────────────────────────────────────────────────────────────────

function openModal(area) {
  document.getElementById('inp-area').value       = area || '';
  document.getElementById('inp-name').value       = '';
  document.getElementById('inp-rent').value       = '';
  document.getElementById('inp-deposit').value    = '';
  document.getElementById('inp-notes').value      = '';
  document.getElementById('inp-pricerange').value = '';
  document.getElementById('inp-balcony').value    = '';
  document.getElementById('inp-sunlight').value   = '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('inp-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function saveSociety() {
  const name       = document.getElementById('inp-name').value.trim();
  const area       = document.getElementById('inp-area').value.trim();
  const rent       = parseInt(document.getElementById('inp-rent').value)    || 0;
  const deposit    = parseInt(document.getElementById('inp-deposit').value) || 0;
  const furnish    = document.getElementById('inp-furnish').value;
  const notes      = document.getElementById('inp-notes').value.trim();
  const pricerange = document.getElementById('inp-pricerange').value;
  const balcony    = document.getElementById('inp-balcony').value;
  const sunlight   = document.getElementById('inp-sunlight').value;

  if (!name || !area) { alert('Please enter society name and area.'); return; }

  const quadrant = currentView !== 'main' ? currentView : guessQuadrant(area);

  societies.push({ id:Date.now(), name, area, rent, deposit, furnish, notes, pricerange, balcony, sunlight, quadrant });
  localStorage.setItem('hyd_societies', JSON.stringify(societies));
  closeModal();

  if (currentView === 'main') { renderMainMap(); renderList(); }
  else { renderQuadrantMap(currentView); renderQSummary(); renderList(); }
}

function guessQuadrant(area) {
  for (const [q, info] of Object.entries(QUADRANTS)) {
    if (info.areas.some(a => a.name.toLowerCase() === area.toLowerCase())) return q;
  }
  return 'NW';
}

function deleteSociety(id) {
  societies = societies.filter(s => s.id !== id);
  localStorage.setItem('hyd_societies', JSON.stringify(societies));
  if (currentView === 'main') { renderMainMap(); renderList(); }
  else { renderQuadrantMap(currentView); renderQSummary(); renderList(); }
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── INIT ─────────────────────────────────────────────────────────────────────
showMain();
</script>
